name: todos
description: "Enterprise-grade Flutter Todo app — Clean Architecture, Drift, Bloc, go_router."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State management ──────────────────────────────────────────────────────
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.8

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^17.2.3

  # ── Dependency injection ──────────────────────────────────────────────────
  get_it: ^9.2.1

  # ── Database ──────────────────────────────────────────────────────────────
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── Functional programming ────────────────────────────────────────────────
  dartz: ^0.10.1

  # ── Security ──────────────────────────────────────────────────────────────
  flutter_secure_storage: ^10.1.0
  crypto: ^3.0.7

  # ── UI / Notifications ────────────────────────────────────────────────────
  another_flushbar: ^2.0.1
  syncfusion_flutter_charts: ^33.2.5
  flutter_native_splash: ^2.4.7

  # ── Forms & validation ────────────────────────────────────────────────────
  formz: ^0.8.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  collection: ^1.19.1
  logger: ^2.7.0
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^6.0.0

  # ── Code generation ───────────────────────────────────────────────────────
  build_runner: ^2.15.0
  drift_dev: ^2.31.0

  # ── Testing ───────────────────────────────────────────────────────────────
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # ── Icons & splash ────────────────────────────────────────────────────────
  flutter_launcher_icons: ^0.14.3

# ── Launcher icons config ─────────────────────────────────────────────────
flutter_icons:
  android: true
  ios: true
  # Provide your icon at this path before running `dart run flutter_launcher_icons`
  image_path: "assets/images/app_icon.png"

# ── Native splash config ──────────────────────────────────────────────────
flutter_native_splash:
  color: "#1A1A2E"
  color_dark: "#0D0D1A"
  android_12:
    color: "#1A1A2E"
    color_dark: "#0D0D1A"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
